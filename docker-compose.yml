services:
  db:
    image: pgvector/pgvector:pg16
    container_name: wellbeing_db
    environment:
      POSTGRES_USER: wellbeing
      POSTGRES_PASSWORD: wellbeing123
      POSTGRES_DB: wellbeing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wellbeing"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: wellbeing_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - DATABASE_URL=postgresql://wellbeing:wellbeing123@db:5432/wellbeing
      - GARMIN_EMAIL=${GARMIN_EMAIL}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_IS_PRODUCTION=false
      - DOKU_API_KEY=${DOKU_API_KEY}
      - DOKU_SECRET_KEY=${DOKU_SECRET_KEY}
      - DOKU_IS_SANDBOX=true
      - FIREBASE_API_KEY=${FIREBASE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: wellbeing_frontend
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8000
      - WEB_PORT=8080
      - FIREBASE_API_KEY=${FIREBASE_API_KEY}

  admin:
    build: ./admin
    container_name: wellbeing_admin
    ports:
      - "8501:8501"
    volumes:
      - ./admin:/app
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8000

volumes:
  pgdata:
