name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push backend to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git clone https://husnulirdoq:$HF_TOKEN@huggingface.co/spaces/husnulirdoq/wellbeing-backend hf-backend
          cp backend/main.py hf-backend/
          cp backend/database.py hf-backend/
          cp backend/models.py hf-backend/
          cp backend/auth.py hf-backend/
          cp backend/firebase_auth.py hf-backend/
          cp backend/garmin_service.py hf-backend/
          cp backend/payment_service.py hf-backend/
          cp backend/gemini_service.py hf-backend/
          cp backend/weather_service.py hf-backend/
          cp backend/requirements-hf.txt hf-backend/requirements.txt
          cp backend/Dockerfile hf-backend/
          cp backend/README.md hf-backend/
          cd hf-backend
          git add .
          git diff --staged --quiet || git commit -m "deploy: update from GitHub"
          git push

  deploy-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create admin Space if not exists
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python - <<'EOF'
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ["HF_TOKEN"])
          try:
              api.create_repo(
                  repo_id="husnulirdoq/wellbeing-admin",
                  repo_type="space",
                  space_sdk="streamlit",
                  exist_ok=True
              )
              print("Space created or already exists")
          except Exception as e:
              print(f"Note: {e}")
          EOF

      - name: Push admin to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git clone https://husnulirdoq:$HF_TOKEN@huggingface.co/spaces/husnulirdoq/wellbeing-admin hf-admin || true
          if [ -d "hf-admin" ]; then
            cp admin/app.py hf-admin/
            cp admin/requirements.txt hf-admin/
            cp admin/README.md hf-admin/
            cd hf-admin
            git add .
            git diff --staged --quiet || git commit -m "deploy: update from GitHub"
            git push
          else
            echo "Admin space not found, skipping push"
          fi
